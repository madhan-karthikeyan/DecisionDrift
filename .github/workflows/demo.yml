name: DecisionDrift Review (self-test)
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./
        with:
          llm-api-key: ${{ secrets.DECISIONDRIFT_LLM_API_KEY }}
          llm-model: qwen2.5-coder:7b
          llm-base-url: http://localhost:11434/v1
          fail-on-violation: 'true'
